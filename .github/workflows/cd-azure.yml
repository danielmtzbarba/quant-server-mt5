# Trigger AZURE WORKFLOW
name: Deploy MT5 Engine (Azure)

on:
  push:
    branches: [main, dev]
    paths:
      - "infra/docker/trading_engine/**"
      - "infra/terraform/azure/**"
      - ".github/workflows/cd-azure.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  terraform:
    name: Azure Infrastructure
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    defaults:
      run:
        working-directory: infra/terraform/azure
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Import (Self-Healing)
        run: ./import.sh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_LOCATION: "westeurope"
          AZURE_VM_SIZE: "Standard_B2ts_v2"
          ADMIN_IP: ${{ secrets.ADMIN_IP }}
          SSH_PUBLIC_KEY: ${{ secrets.AZURE_SSH_PUBLIC_KEY }}
          GITHUB_REPO_URL: "https://github.com/${{ github.repository }}"
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -var="AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" \
            -var="AZURE_RESOURCE_GROUP=${{ vars.AZURE_RESOURCE_GROUP }}" \
            -var="AZURE_LOCATION=westeurope" \
            -var="AZURE_VM_SIZE=Standard_B2ts_v2" \
            -var="ADMIN_IP=${{ secrets.ADMIN_IP }}" \
            -var="SSH_PUBLIC_KEY=${{ secrets.AZURE_SSH_PUBLIC_KEY }}" \
            -var="GITHUB_REPO_URL=https://github.com/${{ github.repository }}" \
            -var="TAILSCALE_AUTH_KEY=${{ secrets.TAILSCALE_AUTH_KEY }}"

  build-and-push:
    name: Build MT5 Engine
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./infra/docker/trading_engine
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mt5-engine:latest
            ghcr.io/${{ github.repository_owner }}/mt5-engine:${{ github.sha }}
          cache-from: type=gha,scope=mt5-engine
          cache-to: type=gha,mode=max,scope=mt5-engine

  deploy:
    name: Deploy to Azure
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Wait for Azure VM & Resolve IP
        run: |
          echo "Waiting for machine to appear in Tailnet..."
          timeout 300s bash -c 'until tailscale status | grep -q "mt5-engine-azure"; do sleep 10; done'
          TS_IP=$(tailscale ip -4 mt5-engine-azure)
          echo "VM_IP=$TS_IP" >> $GITHUB_ENV

      - name: SSH and Restart Stack
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_PRIVATE_KEY }}" > ~/.ssh/azure_deploy_key
          chmod 600 ~/.ssh/azure_deploy_key

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/azure_deploy_key danielmtz@${{ env.VM_IP }} << 'EOF'
            # 1. Wait for Cloud-Init to finish (crucial for Docker to be ready)
            sudo cloud-init status --wait
            
            # 2. Fix Docker permissions if they haven't kicked in
            if ! groups | grep -q docker; then
              sudo usermod -aG docker $USER
              # This allows the rest of the script to run with docker privileges without logging out
              newgrp docker << 'EON'
            fi

            cd /app
            git fetch origin
            git checkout dev
            git pull origin dev
            
            cd infra/docker/trading_engine
            
            # Create .env file
            cat << ENV > .env
            MT5_LOGIN=${{ secrets.MT5_LOGIN }}
            MT5_PASSWORD=${{ secrets.MT5_PASSWORD }}
            MT5_SERVER=${{ secrets.MT5_SERVER }}
            BACKEND_URL=${{ vars.BACKEND_URL }}
            ENV
            
            # 3. Explicitly use 'sudo' for Docker if newgrp fails, and check logs
            sudo docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            sudo docker compose down --remove-orphans
            sudo docker compose pull
            sudo docker compose up -d
            
            echo "Checking container status..."
            sudo docker compose ps
            
            # Diagnostic: If ps is empty, show logs
            if [ -z "$(sudo docker compose ps -q)" ]; then
              echo "Error: Containers failed to start. Last 20 lines of logs:"
              sudo docker compose logs --tail=20
            fi
          EOF
