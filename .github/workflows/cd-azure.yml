# Trigger Workflow (change of region)
name: Deploy MT5 Engine (Azure)

on:
  push:
    branches: [main, dev]
    paths:
      - ".github/workflows/cd-azure.yml"
      - "infra/terraform/azure/**"
      - "infra/docker/trading_engine/docker-compose.yml"
      - "services/mt5_service/**"
      - "services/sync_service/**"
      - "libs/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  terraform:
    name: Azure Infrastructure
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    defaults:
      run:
        working-directory: infra/terraform/azure
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Import (Self-Healing)
        run: ./import.sh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_LOCATION: "denmarkeast"
          AZURE_VM_SIZE: "Standard_B1ms"
          ADMIN_IP: ${{ secrets.ADMIN_IP }}
          SSH_PUBLIC_KEY: ${{ secrets.AZURE_SSH_PUBLIC_KEY }}
          GITHUB_REPO_URL: "https://github.com/${{ github.repository }}"

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -var="AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" \
            -var="AZURE_RESOURCE_GROUP=${{ vars.AZURE_RESOURCE_GROUP }}" \
            -var="AZURE_LOCATION=denmarkeast" \
            -var="AZURE_VM_SIZE=Standard_B1ms" \
            -var="ADMIN_IP=${{ secrets.ADMIN_IP }}" \
            -var="SSH_PUBLIC_KEY=${{ secrets.AZURE_SSH_PUBLIC_KEY }}" \
            -var="GITHUB_REPO_URL=https://github.com/${{ github.repository }}" \
            -var="TAILSCALE_AUTH_KEY=${{ secrets.TAILSCALE_AUTH_KEY }}"

  build-base:
    name: Build Shared Base Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Base
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/base.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/quant-server-mt5-base:latest
          cache-from: type=gha,scope=base-image
          cache-to: type=gha,mode=max,scope=base-image

  build-and-push:
    name: Build Services
    needs: [terraform, build-base]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [mt5_service, sync_service]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to Azure
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Wait for Azure VM & Resolve IP
        run: |
          echo "Waiting for machine to appear in Tailnet..."
          timeout 300s bash -c 'until tailscale status | grep -q "mt5-engine-azure"; do sleep 10; done'
          TS_IP=$(tailscale ip -4 mt5-engine-azure)
          echo "VM_IP=$TS_IP" >> $GITHUB_ENV

      - name: SSH and Restart Stack
        env:
          AZURE_ENV: ${{ secrets.AZURE_ENV }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_PRIVATE_KEY }}" > ~/.ssh/azure_deploy_key
          chmod 600 ~/.ssh/azure_deploy_key

          # Write unified secrets to a local file
          echo "$AZURE_ENV" > .env
          echo "GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}" >> .env

          # Copy to temp location
          scp -o StrictHostKeyChecking=no -i ~/.ssh/azure_deploy_key .env danielmtz@${{ env.VM_IP }}:/tmp/.env

          # Execute Remote Commands
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/azure_deploy_key danielmtz@${{ env.VM_IP }} "
          sudo cloud-init status --wait
          sudo mkdir -p /app/infra/envs
          sudo chown -R \$USER:\$USER /app
          cd /app

          if [ ! -d '.git' ]; then
            git clone https://github.com/${{ github.repository }} .
          else
            git fetch origin
            git checkout -B ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            git clean -fd
          fi

          # Place env files correctly for standard injection
          cp /tmp/.env .env
          cp /tmp/.env infra/envs/shared.env
          cp /tmp/.env infra/envs/mt5.env

          cd infra/docker/trading_engine

          echo '${{ secrets.GITHUB_TOKEN }}' | sudo docker login ghcr.io -u '${{ github.actor }}' --password-stdin
          sudo docker compose down --remove-orphans
          sudo docker compose pull
          sudo docker compose up -d --build

          echo 'Deployment Complete.'
          sudo docker compose ps
          "
