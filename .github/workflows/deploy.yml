name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    # Set up GCP configuration
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deployer@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan -var="project_id=${{ vars.GCP_PROJECT_ID }}" -var="github_repo_url=https://github.com/${{ github.repository }}" -var="ssh_public_key=${{ secrets.GCP_SSH_PUBLIC_KEY }}" -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan

      - name: Get VM IP
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: vm_ip
        run: echo "ip=$(terraform output -raw vm_ip)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.vm_ip.outputs.ip }}
          username: danielmtz
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            cd /app && git pull
            export GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}
            docker compose -f infra/docker/server/docker-compose.yml pull
            docker compose -f infra/docker/server/docker-compose.yml up -d
