name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    # Set up GCP configuration
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deployer@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan -var="project_id=${{ vars.GCP_PROJECT_ID }}" -var="github_repo_url=https://github.com/${{ github.repository }}" -var="ssh_public_key=${{ secrets.GCP_SSH_PUBLIC_KEY }}" -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan

      - name: Get VM IP
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: vm_ip
        run: echo "ip=$(terraform output -raw vm_ip)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          SHARED_ENV: ${{ secrets.SHARED_ENV }}
          CORE_ENV: ${{ secrets.CORE_ENV }}
          EXECUTION_ENV: ${{ secrets.EXECUTION_ENV }}
          MESSAGING_ENV: ${{ secrets.MESSAGING_ENV }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.vm_ip.outputs.ip }}
          username: danielmtz
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          envs: SHARED_ENV,CORE_ENV,EXECUTION_ENV,MESSAGING_ENV
          script: |
            # --- Wait for Startup Script Readiness ---
            echo "Waiting for Docker and Git to be fully installed by startup script..."
            timeout 180s bash -c 'until command -v git >/dev/null 2>&1 && command -v docker >/dev/null 2>&1; do echo "Checking tools..." && sleep 10; done'
            
            # --- Inject Environment Secrets (Defensive) ---
            echo "Injecting service environment files..."
            mkdir -p /app/infra/envs
            [ -n "$SHARED_ENV" ] && echo "$SHARED_ENV" > /app/infra/envs/shared.env || echo "Skipping shared.env (empty)"
            [ -n "$CORE_ENV" ] && echo "$CORE_ENV" > /app/infra/envs/core.env || echo "Skipping core.env (empty)"
            [ -n "$EXECUTION_ENV" ] && echo "$EXECUTION_ENV" > /app/infra/envs/execution.env || echo "Skipping execution.env (empty)"
            [ -n "$MESSAGING_ENV" ] && echo "$MESSAGING_ENV" > /app/infra/envs/messaging.env || echo "Skipping messaging.env (empty)"
            
            # --- Perform Deployment ---
            cd /app && git pull
            export GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}
            docker compose -f infra/docker/server/docker-compose.yml pull
            docker compose -f infra/docker/server/docker-compose.yml up -d
            
            # --- Post-Deployment Health Check ---
            echo "Running health checks for services (8001, 8002, 8003)..."
            max_retries=12
            for i in $(seq 1 $max_retries); do
              core_ok=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/ || echo "000")
              exec_ok=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8002/ || echo "000")
              msg_ok=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8003/ || echo "000")
              
              if [[ "$core_ok" != "000" && "$exec_ok" != "000" && "$msg_ok" != "000" ]]; then
                echo "All services are UP and responding!"
                echo "--------------------------------------------------------"
                echo "Tailscale IP for access: $(tailscale ip -4)"
                echo "Admin Dashboard: http://$(tailscale ip -4):8001/admin"
                echo "--------------------------------------------------------"
                exit 0
              fi
              
              echo "Waiting for services... (Attempt $i/$max_retries)"
              sleep 5
            done
            
            echo "--------------------------------------------------------"
            echo "ERROR: Health check failed! Printing diagnostics..."
            echo "--------------------------------------------------------"
            docker compose -f infra/docker/server/docker-compose.yml ps
            docker compose -f infra/docker/server/docker-compose.yml logs --tail=20
            exit 1
