# Trigger GCP workflow  (moving to EU, non free tier)
name: CI/CD (GCP Server)

on:
  push:
    branches: ["**"]
    paths-ignore:
      - ".github/workflows/cd-azure.yml"
      - "infra/terraform/azure/**"
      - "services/mt5_service/**"
      - "infra/docker/trading_engine/**"
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Quality Assurance (Lint & Test)
  # ---------------------------------------------------------------------------
  qa:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff (Linting)
        run: uv run ruff check .

      - name: Run Ruff (Formatting Check)
        run: uv run ruff format --check .

      - name: Run Tests (Pytest)
        run: uv run pytest
        env:
          PYTHONPATH: .
          CORE_SERVICE_URL: http://localhost:8001
          EXECUTION_SERVICE_URL: http://localhost:8002

  # ---------------------------------------------------------------------------
  # 2. Terraform (Moved up so Build can use its outputs)
  # ---------------------------------------------------------------------------
  terraform:
    name: "Terraform"
    needs: qa
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/gcp
    outputs:
      vm_name: ${{ steps.vm_meta.outputs.name }}
      vm_zone: ${{ steps.vm_meta.outputs.zone }}
      wif_provider: ${{ steps.vm_meta.outputs.wif_provider }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deployer@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="PROJECT_ID=${{ vars.GCP_PROJECT_ID }}" \
            -var="GITHUB_REPO_URL=https://github.com/${{ github.repository }}" \
            -var="SSH_PUBLIC_KEY=${{ secrets.GCP_SSH_PUBLIC_KEY }}" \
            -var="ADMIN_IP=${{ secrets.ADMIN_IP }}" \
            -var="TAILSCALE_AUTH_KEY=${{ secrets.TAILSCALE_AUTH_KEY }}"

      - name: Get VM Metadata
        id: vm_meta
        run: |
          echo "name=$(terraform output -raw vm_name)" >> $GITHUB_OUTPUT
          echo "zone=$(terraform output -raw vm_zone)" >> $GITHUB_OUTPUT
          # This must match the output name in your main.tf
          echo "wif_provider=$(terraform output -raw wif_provider_name)" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # 3. Build Shared Base Image
  # ---------------------------------------------------------------------------
  build-base:
    name: Build Base Image
    needs: [qa, terraform]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Base
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/base.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/quant-server-mt5-base:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

  # ---------------------------------------------------------------------------
  # 4. Build & Push Services
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push
    needs: [qa, build-base, terraform]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [core_service, execution_service, messaging_service]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GCP (Keyless)
        uses: google-github-actions/auth@v2
        with:
          # FIXED INDENTATION HERE:
          workload_identity_provider: ${{ needs.terraform.outputs.wif_provider }}
          service_account: github-actions-deployer@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ---------------------------------------------------------------------------
  # 5. Zero-Exposure Deployment
  # ---------------------------------------------------------------------------
  deploy:
    name: Continuous Deployment
    needs: [build-and-push, build-base, terraform]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      SHARED_ENV: ${{ secrets.SHARED_ENV }}
      CORE_ENV: ${{ secrets.CORE_ENV }}
      EXECUTION_ENV: ${{ secrets.EXECUTION_ENV }}
      MESSAGING_ENV: ${{ secrets.MESSAGING_ENV }}
    steps:
      - name: Authenticate to GCP (Keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.terraform.outputs.wif_provider }}
          service_account: github-actions-deployer@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Prepare Deployment Script
        run: |
          cat <<'EOF' > deploy_script.sh
          #!/bin/bash
          set -e
          echo "Waiting for Docker and Git to be ready..."
          timeout 180s bash -c 'until command -v git >/dev/null 2>&1 && command -v docker >/dev/null 2>&1; do sleep 10; done'

          sudo mkdir -p /app
          sudo chown -R danielmtz:danielmtz /app

          mkdir -p /app/infra/envs
          echo "$SHARED_ENV" > /app/infra/envs/shared.env
          echo "$CORE_ENV" > /app/infra/envs/core.env
          echo "$EXECUTION_ENV" > /app/infra/envs/execution.env
          echo "$MESSAGING_ENV" > /app/infra/envs/messaging.env

          cd /app

          # Dynamic Sync Logic
          if [ ! -d '.git' ]; then
            echo "First time deploy: Cloning repository..."
            git clone https://github.com/${{ github.repository }} .
          else
            echo "Redeploy: Syncing with GitHub..."
            git fetch origin
            git checkout -B ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            git clean -fd  # This removes untracked files (extra safety)
          fi

          export GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}

          docker compose -f infra/docker/server/docker-compose.yml down --remove-orphans
          docker compose -f infra/docker/server/docker-compose.yml pull
          docker compose -f infra/docker/server/docker-compose.yml up -d --build
          docker compose -f infra/docker/server/docker-compose.yml restart caddy

          # 4. Success Verification (Health Check)
          echo "Running health checks..."
          max_retries=12
          for j in $(seq 1 $max_retries); do
            core_ok=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/ || echo "000")
            exec_ok=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8002/ || echo "000")
            msg_ok=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8003/ || echo "000")

            if [[ "$core_ok" != "000" && "$exec_ok" != "000" && "$msg_ok" != "000" ]]; then
              echo "--------------------------------------------------------"
              echo "SUCCESS: All services are UP and responding!"
              echo "Tailscale IP: $(tailscale ip -4)"
              echo "Admin Dashboard: http://$(tailscale ip -4):8001/admin"
              echo "--------------------------------------------------------"
              exit 0
            fi
            echo "Waiting for services... (Attempt $j/$max_retries)"
            sleep 5
          done

          echo "ERROR: Health Check Failed!"
          docker compose -f infra/docker/server/docker-compose.yml ps
          docker compose -f infra/docker/server/docker-compose.yml logs --tail=20
          exit 1
          EOF
          chmod +x deploy_script.sh

      - name: Deploy via IAP Tunnel
        run: |
          gcloud compute scp deploy_script.sh danielmtz@${{ needs.terraform.outputs.vm_name }}:/tmp/deploy_script.sh \
            --zone=${{ needs.terraform.outputs.vm_zone }} \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --tunnel-through-iap

          gcloud compute ssh danielmtz@${{ needs.terraform.outputs.vm_name }} \
            --zone=${{ needs.terraform.outputs.vm_zone }} \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --command="export SHARED_ENV='${SHARED_ENV}'; export CORE_ENV='${CORE_ENV}'; export EXECUTION_ENV='${EXECUTION_ENV}'; export MESSAGING_ENV='${MESSAGING_ENV}'; bash /tmp/deploy_script.sh"
