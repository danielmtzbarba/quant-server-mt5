name: Deploy MT5 Engine (Azure)

on:
  push:
    branches: [main, dev]
    paths:
      - "infra/docker/trading_engine/**"
      - "infra/terraform/azure_*.tf"
      - ".github/workflows/deploy-azure-mt5.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  terraform:
    name: Azure Infrastructure
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Isolating Azure Terraform
        # Removes generic files to ensure only azure_*.tf files define the resources
        run: rm -f main.tf variables.tf terraform.tfvars backend.tf
        working-directory: infra/terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: infra/terraform

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -var="AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" \
            -var="AZURE_RESOURCE_GROUP=${{ vars.AZURE_RESOURCE_GROUP }}" \
            -var="AZURE_LOCATION=westeurope" \
            -var="AZURE_VM_SIZE=Standard_B2ts_v2" \
            -var="ADMIN_IP=${{ secrets.ADMIN_IP }}" \
            -var="SSH_PUBLIC_KEY=${{ secrets.AZURE_SSH_PUBLIC_KEY }}" \
            -var="GITHUB_REPO_URL=https://github.com/${{ github.repository }}" \
            -var="TAILSCALE_AUTH_KEY=${{ secrets.TAILSCALE_AUTH_KEY }}"
        working-directory: infra/terraform

  build-and-push:
    name: Build MT5 Engine
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./infra/docker/trading_engine
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mt5-engine:latest
            ghcr.io/${{ github.repository_owner }}/mt5-engine:${{ github.sha }}

  deploy:
    name: Deploy to Azure
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Wait for Azure VM & Resolve IP
        run: |
          echo "Waiting for machine to appear in Tailnet..."
          timeout 300s bash -c 'until tailscale status | grep -q "mt5-engine-azure"; do sleep 10; done'
          TS_IP=$(tailscale ip -4 mt5-engine-azure)
          echo "VM_IP=$TS_IP" >> $GITHUB_ENV

      - name: SSH and Restart Stack
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Use a heredoc without quotes to allow GitHub variable expansion
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key danielmtz@${{ env.VM_IP }} << EOF
            sudo cloud-init status --wait
            
            # Navigate to app and update
            if [ ! -d "/app" ]; then sudo mkdir -p /app && sudo chown danielmtz:danielmtz /app; fi
            cd /app
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }} .
            fi
            git fetch origin
            git checkout dev
            git pull origin dev
            
            cd infra/docker/trading_engine
            
            # Create .env file with secrets
            echo "MT5_LOGIN=${{ secrets.MT5_LOGIN }}" > .env
            echo "MT5_PASSWORD=${{ secrets.MT5_PASSWORD }}" >> .env
            echo "MT5_SERVER=${{ secrets.MT5_SERVER }}" >> .env
            echo "BACKEND_URL=${{ vars.BACKEND_URL }}" >> .env
            
            # Docker commands
            sudo docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            sudo docker compose pull
            sudo docker compose up -d
            sudo docker compose ps
          EOF
