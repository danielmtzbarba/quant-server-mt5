name: Deploy MT5 Engine (Azure)

on:
  push:
    branches: [main, dev]
    paths:
      - "infra/docker/trading_engine/**"
      - "infra/terraform/**"
      - ".github/workflows/deploy-azure-mt5.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Infrastructure (Terraform)
  # ---------------------------------------------------------------------------
  terraform:
    name: Azure Infrastructure
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: infra/terraform

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -var="AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" \
            -var="AZURE_RESOURCE_GROUP=${{ vars.AZURE_RESOURCE_GROUP || 'quant-trading-rg' }}" \
            -var="AZURE_LOCATION=westeurope" \
            -var="AZURE_VM_SIZE=Standard_B2ts_v2" \
            -var="ADMIN_IP=${{ secrets.ADMIN_IP }}" \
            -var="SSH_PUBLIC_KEY=${{ secrets.GCP_SSH_PUBLIC_KEY }}" \
            -var="GITHUB_REPO_URL=https://github.com/${{ github.repository }}" \
            -var="TAILSCALE_AUTH_KEY=${{ secrets.TAILSCALE_AUTH_KEY }}"
        working-directory: infra/terraform

  # ---------------------------------------------------------------------------
  # 2. Build & Push Image (GHCR)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build MT5 Engine
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./infra/docker/trading_engine
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mt5-engine:latest
            ghcr.io/${{ github.repository_owner }}/mt5-engine:${{ github.sha }}

  # ---------------------------------------------------------------------------
  # 3. Deploy to Azure VM via Tailscale SSH
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Azure
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Wait for Azure VM
        run: |
          echo "Polling Target VM on Tailnet..."
          timeout 300s bash -c 'while ! ping -c 1 mt5-engine-azure >/dev/null 2>&1; do echo "Waiting for MagicDNS propagation..."; sleep 10; done'
          echo "Target is reachable!"

      - name: SSH and Restart Stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: mt5-engine-azure
          username: danielmtz
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            cd /app
            git pull origin dev
            cd infra/docker/trading_engine

            echo "MT5_LOGIN=${{ secrets.MT5_LOGIN }}" > .env
            echo "MT5_PASSWORD=${{ secrets.MT5_PASSWORD }}" >> .env
            echo "MT5_SERVER=${{ secrets.MT5_SERVER }}" >> .env
            echo "BACKEND_URL=${{ vars.BACKEND_URL }}" >> .env
            echo "TS_AUTHKEY=${{ secrets.TAILSCALE_AUTH_KEY }}" >> .env

            docker compose pull
            docker compose up -d
            docker compose ps
