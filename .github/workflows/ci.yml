name: CI (Quality Assurance)

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  qa:
    name: Lint & Test
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff (Linting)
        run: uv run ruff check .

      - name: Run Ruff (Formatting Check)
        run: uv run ruff format --check .

      - name: Run Tests (Pytest)
        run: uv run pytest
        env:
          PYTHONPATH: .
          CORE_SERVICE_URL: http://localhost:8001
          EXECUTION_SERVICE_URL: http://localhost:8002

  build-and-push:
    name: Build & Push to GHCR
    needs: qa
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      packages: write

    strategy:
      matrix:
        service: [core_service, execution_service, messaging_service]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP (Keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_ID }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deployer@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}

  deploy:
    name: Continuous Deployment
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to GCE via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER || 'danielmtz' }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            cd /app
            export GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}
            docker compose -f infra/docker/server/docker-compose.yml pull
            docker compose -f infra/docker/server/docker-compose.yml up -d
