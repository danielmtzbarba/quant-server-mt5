name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run Core Service Tests
        run: uv run --project services/core_service pytest services/core_service/tests

      - name: Run Execution Service Tests
        run: uv run --project services/execution_service pytest services/execution_service/tests

      - name: Run Messaging Service Tests
        run: uv run --project services/messaging_service pytest services/messaging_service/tests
