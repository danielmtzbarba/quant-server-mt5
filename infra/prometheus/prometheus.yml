global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'core-service'
    static_configs:
      - targets: ['core-service:8001']

  - job_name: 'messaging-service'
    static_configs:
      - targets: ['messaging-service:8003']

  - job_name: 'sync-service'
    static_configs:
      - targets: ['mt5-engine-azure:8080']

  - job_name: 'mt5-service'
    static_configs:
      - targets: ['mt5-engine-azure:8000']

  - job_name: 'node-exporter-gcp'
    static_configs:
      - targets: ['host.docker.internal:9100']

  - job_name: 'node-exporter-azure'
    static_configs:
      - targets: ['mt5-engine-azure:9100']
