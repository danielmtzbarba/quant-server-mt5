services:
  core-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-danielmtzbarba}/core_service:latest
    build:
      context: ../../../
      dockerfile: services/core_service/Dockerfile
    container_name: core_service
    volumes:
      - ../../../services/core_service/app:/app/services/core_service/app
      - ../../../libs:/app/libs
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ../../envs/shared.env
      - ../../envs/core.env
    environment:
      - PYTHONPATH=/app/libs:/app/services/core_service/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    develop:
      watch:
        - path: services/core_service/app
          action: sync+restart
          target: /app/services/core_service/app
        - path: libs
          action: sync+restart
          target: /app/libs
        - path: pyproject.toml
          action: rebuild
        - path: uv.lock
          action: rebuild

  execution-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-danielmtzbarba}/execution_service:latest
    build:
      context: ../../../
      dockerfile: services/execution_service/Dockerfile
    container_name: execution_service
    volumes:
      - ../../../services/execution_service/app:/app/services/execution_service/app
      - ../../../libs:/app/libs
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - ../../envs/shared.env
      - ../../envs/execution.env
    environment:
      - CORE_SERVICE_URL=http://core_service:8001
      - MESSAGING_SERVICE_URL=http://messaging_service:8003
      - PYTHONPATH=/app/libs:/app/services/execution_service/app
    depends_on:
      - core-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    develop:
      watch:
        - path: services/execution_service/app
          action: sync+restart
          target: /app/services/execution_service/app
        - path: libs
          action: sync+restart
          target: /app/libs
        - path: pyproject.toml
          action: rebuild
        - path: uv.lock
          action: rebuild

  messaging-service:
    image: ghcr.io/danielmtzbarba/messaging_service:latest
    build:
      context: ../../../
      dockerfile: services/messaging_service/Dockerfile
    container_name: messaging_service
    volumes:
      - ../../../services/messaging_service/app:/app/services/messaging_service/app
      - ../../../libs:/app/libs
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file:
      - ../../envs/shared.env
      - ../../envs/messaging.env
    environment:
      - CORE_SERVICE_URL=http://core_service:8001
      - EXECUTION_SERVICE_URL=http://execution_service:8002
      - PYTHONPATH=/app/libs:/app/services/messaging_service/app
    depends_on:
      - core-service
      - execution-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    develop:
      watch:
        - path: services/messaging_service/app
          action: sync+restart
          target: /app/services/messaging_service/app
        - path: libs
          action: sync+restart
          target: /app/libs
        - path: pyproject.toml
          action: rebuild
        - path: uv.lock
          action: rebuild

