services:
  core-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-danielmtzbarba}/core_service:latest
    build:
      context: ../../../
      dockerfile: services/core_service/Dockerfile
    container_name: core_service
    restart: unless-stopped
    env_file:
      - ../../envs/shared.env
      - ../../envs/core.env
    environment:
      - PYTHONPATH=/app/libs/common_logging/src:/app/libs/common_config/src:/app/libs/common_events/src:/app/libs/common_models/src:/app/services/core_service/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  messaging-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-danielmtzbarba}/messaging_service:latest
    build:
      context: ../../../
      dockerfile: services/messaging_service/Dockerfile
    container_name: messaging_service
    restart: unless-stopped
    env_file:
      - ../../envs/shared.env
      - ../../envs/messaging.env
    environment:
      - CORE_SERVICE_URL=http://core_service:8001
      - PYTHONPATH=/app/libs/common_logging/src:/app/libs/common_config/src:/app/libs/common_events/src:/app/libs/common_models/src:/app/services/messaging_service/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # Match the Terraform UDP change
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - messaging-service

volumes:
  caddy_data:
  caddy_config:
