services:
  postgres:
    image: postgres:16.3-alpine
    container_name: postgres
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m

    # Runtime config tuning for low-RAM system
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=512MB
      -c max_connections=50

volumes:
  postgres_data:
